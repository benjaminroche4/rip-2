# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    # Cookie options are pinned explicitly even though Symfony 7.3 defaults
    # already match — locks the security posture against future framework
    # upgrades silently flipping a flag.
    session:
        cookie_secure: auto
        cookie_samesite: lax
        cookie_httponly: true

    # ESI + fragments: enables {{ render_esi(controller(...)) }} for auth-aware
    # footer chip. Without a reverse proxy in front, Symfony renders the
    # fragment inline transparently — same output, just adds the
    # <esi:include> scaffolding if/when a CDN like Cloudflare Workers is
    # added in front. Required to make the rest of the page HTTP-cacheable.
    esi: true
    fragments: true

    # Anti-spam on public POST forms. Storage is cache.app (filesystem on
    # o2switch — no Redis available). Lookup is per client IP — each
    # controller calls $factory->create($request->getClientIp())->consume().
    rate_limiter:
        form_contact:
            policy: fixed_window
            limit: 5
            interval: '1 minute'
        form_estimation:
            policy: fixed_window
            limit: 5
            interval: '1 minute'
        form_newsletter:
            policy: fixed_window
            limit: 5
            interval: '1 minute'
        # Admin mutations: ROLE_ADMIN is already required, but a per-IP
        # limiter caps damage if an admin session gets hijacked. Keeps
        # filesystem-friendly (cache.app) — no Redis needed.
        admin_mutation:
            policy: fixed_window
            limit: 60
            interval: '1 minute'
        # OTP verification attempts. 6-digit numeric space (1M codes) is
        # tractable without a hard cap, so 5 attempts / 15 min per IP is
        # enough for legitimate typos and shuts down enumeration.
        email_verification_attempts:
            policy: fixed_window
            limit: 5
            interval: '15 minutes'
        # Resend a fresh OTP. 1 / 60 s caps inbox-bombing of the user and
        # our SMTP quota.
        email_verification_resend:
            policy: fixed_window
            limit: 1
            interval: '1 minute'
        # Account creation throttle — bots spraying the register form would
        # otherwise pollute the DB and burn the SMTP quota on OTP emails. 5
        # signups / 15 min per IP is generous for legit users (corporate NAT)
        # while shutting down volumetric attacks.
        register_attempts:
            policy: fixed_window
            limit: 5
            interval: '15 minutes'
        # Reset-password request throttle — without this an attacker can mail-
        # bomb a victim's inbox with legitimate-looking reset emails.
        reset_password_request:
            policy: fixed_window
            limit: 3
            interval: '15 minutes'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
        # Bump anti-spam limits in test so the suite, which fires many POSTs
        # from 127.0.0.1, does not start hitting 429 instead of testing the
        # form behavior. The production limits stay at 5/min above.
        rate_limiter:
            form_contact:
                limit: 1000
            form_estimation:
                limit: 1000
            form_newsletter:
                limit: 1000
            admin_mutation:
                limit: 1000
            email_verification_attempts:
                limit: 1000
            email_verification_resend:
                limit: 1000
            register_attempts:
                limit: 1000
            reset_password_request:
                limit: 1000
