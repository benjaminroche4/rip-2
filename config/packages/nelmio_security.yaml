nelmio_security:
    # prevents framing of the entire site
    clickjacking:
        paths:
            '^/.*': DENY

    # disables content type sniffing for script resources
    content_type:
        nosniff: true

    # Strict-Transport-Security — locked in for 1 year, includes subdomains,
    # opted into Chrome's HSTS preload list (https://hstspreload.org). Required
    # before submitting the domain to the preload programme.
    #
    # NOTE: enabling this on a domain that is sometimes served over HTTP will
    # lock browsers into HTTPS-only for `max_age` seconds. Confirm the entire
    # surface is HTTPS-ready before deploying this change.
    forced_ssl:
        hsts_max_age: 31536000           # 1 year
        hsts_subdomains: true
        hsts_preload: true

    # Send a full URL in the `Referer` header when performing a same-origin request,
    # only send the origin of the document to secure destination (HTTPS->HTTPS),
    # and send no header to a less secure destination (HTTPS->HTTP).
    # If `strict-origin-when-cross-origin` is not supported, use `no-referrer` policy,
    # no referrer information is sent along with requests.
    referrer_policy:
        enabled: true
        policies:
            - 'no-referrer'
            - 'strict-origin-when-cross-origin'

    # X-XSS-Protection: 0 — the modern recommendation per OWASP. The legacy
    # XSS auditors were a footgun; CSP is the right protection. We send `0` to
    # explicitly disable any latent browser heuristic that might mis-fire.
    xss_protection:
        enabled: true
        mode_block: false
        report_uri: ~

    # CSP — enabled in REPORT-ONLY mode: the browser reports violations but
    # never blocks, so shipping this cannot break the site. The current stack
    # still relies on `'unsafe-inline'`/`'unsafe-eval'` on script-src (Stimulus
    # / Turbo bootstrap + EasyAdmin). Address the reported violations one by one
    # (switch to nonces, externalise inline scripts), then move these directives
    # under an `enforce:` block once the report stream goes quiet.
    csp:
        enabled: true
        report:
            default-src: ["'self'"]
            script-src:
                - "'self'"
                - "'unsafe-eval'"
                - "'unsafe-inline'"
                - "https://www.googletagmanager.com"
                - "https://maps.googleapis.com"
            style-src:
                - "'self'"
                - "'unsafe-inline'"
                - "https://fonts.googleapis.com"
            img-src:
                - "'self'"
                - "data:"
                - "https://cdn.sanity.io"
                - "https://maps.googleapis.com"
                - "https://maps.gstatic.com"
                - "https://*.googleusercontent.com"
                - "https://www.googletagmanager.com"
                - "https://www.google-analytics.com"
            font-src:
                - "'self'"
                - "data:"
                - "https://fonts.gstatic.com"
            connect-src:
                - "'self'"
                - "https://*.sanity.io"
                - "https://maps.googleapis.com"
                - "https://www.google-analytics.com"
                - "https://region1.google-analytics.com"
            frame-src:
                - "https://www.youtube.com"
                - "https://www.youtube-nocookie.com"
                - "https://www.google.com"
            object-src: ["'none'"]
            base-uri: ["'self'"]
            frame-ancestors: ["'self'"]

# Dev + test run over http://localhost / 127.0.0.1 — HSTS forces the browser
# into https-only and a single request would lock you out of the local server
# for a year (browser HSTS cache, not server-side). Only enable HSTS in prod.
when@dev:
    nelmio_security:
        forced_ssl: false

when@test:
    nelmio_security:
        forced_ssl: false
