framework:
    messenger:
        failure_transport: failed

        transports:
            # o2switch mutualisé = pas de worker daemon possible. Tout doit
            # rester synchrone en prod. `async` reste défini pour permettre
            # un test local avec `messenger:consume`, mais aucun message
            # n'y est routé.
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                    check_delayed_interval: 60000
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: []

        routing:
            Symfony\Component\Notifier\Message\ChatMessage: sync
            Symfony\Component\Notifier\Message\SmsMessage: sync

            App\Contact\Message\SendContactEmailsMessage: sync
            App\PropertyEstimation\Message\SendEstimationEmailMessage: sync
            App\Shared\Webhook\NotifyMakeWebhookMessage: sync
