faq:
    title: FAQ
    subTitle: Vous avez des questions ?
    1:
        title: Que se passe-t-il si vous ne trouvez pas de logement ?
        text: Nous ne prenons pas une mission sans être certains de la réussir. Avec plus de 900 relocations réussies et un réseau de partenaires unique sur Paris, nous n'avons jamais rendu un client sans clés.
    2:
        title: Sous combien de temps trouvez-vous un logement ?
        text: En moyenne, nos clients signent leur bail en moins de 20 jours. Sur un marché aussi tendu que Paris, c'est ce que fait la différence entre chercher seul et chercher avec nous.
    3:
        title: Mon profil est atypique, pouvez-vous quand même m'aider ?
        text: C'est exactement pourquoi nous existons. Expatriés sans fiches de paie françaises, freelances, étrangers sans garant... notre réseau de propriétaires partenaires nous fait confiance, et cette confiance fait passer votre dossier.
    4:
        title: Mon loyer est-il suffisant pour trouver un bon appartement à Paris ?
        text: Nous commençons toujours par un échange approfondi pour comprendre vos besoins. Ensemble, nous définissons un cahier des charges réaliste et cohérent avec le marché parisien pour que votre recherche parte sur les bonnes bases dès le premier jour.
    5:
        title: Puis-je changer d'offre en cours de mission ?
        text: Oui, tout à fait. Si votre situation évolue en cours de recherche, vous pouvez basculer de l'offre Accompagné vers l'offre Confié à tout moment. Nous nous adaptons à vous, pas l'inverse.
    6:
        title: Pour qui est fait votre service ?
        text: "Notre service s'adresse à toute personne qui souhaite s'installer à Paris : expatriés en mission, familles en relocation, cadres, jeunes actifs, étudiants, entrepreneurs tous ceux qui veulent poser leurs valises sans perdre de temps."
    7:
        title: Comment se déroule la recherche d'appartement ?
        text: Nous prenons en charge tout ce que vous n'avez pas le temps de gérer, de la sélection des biens jusqu'à la remise des clés, en fonction de vos critères et de votre situation. Chaque accompagnement est unique, pensé sur mesure pour vous.
    8:
        title: Peut-on trouver un appartement à Paris sans se déplacer ?
        text: Oui, c'est exactement pour ça que nous existons. La plupart de nos clients sont à l'étranger ou en dehors de Paris au moment où ils commencent leur recherche. Nous gérons les visites, les échanges avec les propriétaires et le montage du dossier à votre place. Vous validez à distance, on s'occupe du reste.
    9:
        title: Est-ce que vos honoraires sont inclus dans le loyer ?
        text: Non. Nos honoraires sont indépendants du loyer et des frais d'agence. Grâce à notre réseau exclusif et nos contacts directs avec les propriétaires, certains biens sont proposés sans frais d'agence, ce qui réduit significativement votre coût d'installation.
    10:
        title: Quels documents faut-il préparer pour un dossier locatif ?
        text: Pas d'inquiétude, nous vous envoyons la liste complète des documents à préparer dès la signature de votre contrat de mission. Chaque dossier est unique, votre expert vous guide personnellement selon votre situation pour constituer le dossier le plus solide possible.
    11:
        title: Quels types de biens proposez-vous ?
        text: Tout dépend de vos critères et de vos besoins. Studio, deux-pièces, grand appartement familial, meublé ou vide. Nous adaptons la recherche à votre situation. Notre accompagnement est 100% sur mesure, pas de catalogue préétabli.
    12:
        title: Quels arrondissements couvrez-vous ?
        text: Nous intervenons sur l'ensemble des 20 arrondissements de Paris ainsi que dans toute la petite couronne.
    13:
        title: Combien de logements me proposez-vous ?
        text: "Cela dépend du marché et de votre situation. Nous ne visons pas le volume notre approche est qualitative : chaque bien sélectionné correspond réellement à vos critères."
    14:
        title: Vous occupez-vous des démarches administratives ?
        text: "Oui. Nous vous accompagnons sur les démarches essentielles à votre installation selon l'offre : ouverture des contrats d'électricité, de gaz, d'internet, mais aussi les démarches liées au visa et à votre situation administrative en France."
