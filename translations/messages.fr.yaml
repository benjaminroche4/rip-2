    faq:
        title: FAQ
        subTitle: Vos questions, nos réponses
        question:
            1:
                title: Gérez-vous les biens en courte et moyenne durée ?
                text: Oui. Nous assurons la gestion locative en courte durée (jusqu’à 30 jours) et en moyenne durée (de 1 à 12 mois), avec une approche adaptée à chaque typologie de location.
            2:
                title: Mettez-vous en valeur le bien avant la mise en location ?
                text: Oui. Nous travaillons la valorisation du bien (présentation, positionnement, diffusion) afin d’attirer des profils de qualité et d’optimiser la performance locative.
            3:
                title: Gérez-vous tout de bout en bout ?
                text: "Absolument. Nous prenons en charge l’intégralité de la gestion : stratégie, diffusion, relation locataire, suivi opérationnel et gestion des revenus. Vous conservez le contrôle, nous gérons le reste."
            4:
                title: Étudiez-vous une stratégie pour optimiser mes revenus ?
                text: Oui. Chaque bien fait l’objet d’une analyse personnalisée afin de définir la stratégie locative la plus pertinente, en fonction de sa localisation, de la demande et de vos objectifs.
            5:
                title: Gérez-vous la communication avec les voyageurs ou locataires ?
                text: Oui. Nous assurons l’ensemble des échanges avant, pendant et après le séjour ou la location, avec un suivi professionnel et réactif.
            6:
                title: Puis-je suivre les revenus générés ?
                text: Oui. Vous bénéficiez d’un suivi clair et régulier de vos revenus locatifs, avec une visibilité complète sur la performance de votre bien.
            7:
                title: Y a-t-il un engagement de durée ?
                text: Non. Notre accompagnement est sans engagement de durée, dans une logique de partenariat basé sur la confiance et la transparence.
            8:
                title: Dois-je avancer des frais ?
                text: Non. Aucun frais de mise en place ni de coût à avancer. Notre rémunération est alignée sur la performance de votre bien.
    testimonial:
        title: Témoignages
