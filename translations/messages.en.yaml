        question:
            1:
                title: What is a relocation service in Paris?
                text: A relocation service supports individuals and professionals in finding accommodation and settling in Paris through a seamless, turnkey approach.
            2:
                title: Who are your relocation services for?
                text: Our services are designed for professionals, companies, and individuals looking to move or settle in Paris.
            3:
                title: How long does it take to find an apartment in Paris?
                text: The timeline depends on your budget and criteria, but on average the search takes anywhere from a few days to several weeks.
            4:
                title: How does the apartment search work?
                text: We handle everything you don't have time to manage, from shortlisting properties to handing over the keys, based on your criteria and your situation. Every search is unique, built entirely around you.
            5:
                title: What sets you apart?
                text: We save you time, secure your application, and give you access to properties before they hit the market.
            6:
                title: Do you always find an apartment?
                text: Thanks to our in-depth knowledge of the Paris market and our network, we significantly increase your chances of securing a property that matches your criteria within a short timeframe.
            7:
                title: "I have an atypical profile, can you help me?"
                text: "Yes, it's our specialty. Entrepreneurs, expats, profiles without a French guarantor: we build a solid application and defend your candidacy with our network of landlords."
            8:
                title: "Do you handle the administrative setup?"
                text: "Yes, we take care of opening your electricity, gas, internet and home insurance contracts."
            9:
                title: "How quickly can my search start?"
                text: "As soon as we receive your criteria, we start the search right away. The Paris market moves fast, every day counts."
