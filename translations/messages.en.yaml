faq:
    title: FAQ
    subTitle: Need More Information?
    1:
        title: What happens if you don't find me an apartment?
        text: We never take on a mission without being confident we can deliver. With over 900 successful relocations and a unique partner network across Paris, we have never left a client without keys.
    2:
        title: How quickly can you find an apartment?
        text: On average, our clients sign their lease in under 20 days. In a market as competitive as Paris, that's the difference between searching alone and searching with us.
    3:
        title: My profile is atypical, can you still help me?
        text: That's exactly why we exist. Expats without French payslips, freelancers, foreigners without a guarantor. Our network of partner landlords trusts us, and that trust gets your application through.
    4:
        title: Is my budget realistic for finding a good apartment in Paris?
        text: We always start with an in-depth conversation to understand your needs. Together, we define a realistic brief aligned with the Paris market, so your search starts on the right footing from day one.
    5:
        title: Can I switch plans during my mission?
        text: Yes, absolutely. If your situation changes during the search, you can move from the Guided offer to the Entrusted offer at any time. We adapt to you, not the other way around.
    6:
        title: Who is your service for?
        text: Our service is for anyone looking to settle in Paris. Expats on assignment, relocating families, executives, young professionals, students, entrepreneurs. Anyone who wants to move in without losing time.
    7:
        title: How does the apartment search work?
        text: We handle everything you don't have time to manage, from shortlisting properties to handing over the keys, based on your criteria and your situation. Every search is unique, built entirely around you.
    8:
        title: Can I find an apartment in Paris without travelling there?
        text: Yes, that's exactly what we're here for. Most of our clients are abroad or outside Paris when they begin their search. We handle viewings, landlord negotiations, and application files on your behalf. You approve from a distance, we handle the rest.
    9:
        title: Are your fees included in the rent?
        text: No. Our fees are independent of the rent and any agency fees. And thanks to our exclusive network and direct relationships with landlords, many properties come with no agency fees at all, significantly reducing your total move-in cost.
    10:
        title: What documents do I need for a rental application?
        text: No need to worry, we send you a full document checklist as soon as your mission contract is signed. Every file is different, and your dedicated expert will guide you personally based on your situation to build the strongest possible application.
    11:
        title: What types of properties do you offer?
        text: It depends entirely on your criteria and needs. Studios, one-bedrooms, large family apartments, furnished or unfurnished. We tailor the search to your situation. No pre-set catalogue, just a search built around you.
    12:
        title: Which areas of Paris do you cover?
        text: We operate across all 20 arrondissements of Paris and throughout the inner suburbs.
    13:
        title: How many properties will you show me?
        text: It depends on the market and your situation. We don't aim for volume. Our approach is quality-driven, every property we present is a genuine match for your criteria.
    14:
        title: Do you handle administrative formalities?
        text: Yes. Depending on your offer, we support you with the essential steps of settling in, setting up electricity, gas and internet contracts, as well as visa-related procedures and your administrative situation in France.
